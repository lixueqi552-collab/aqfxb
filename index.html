<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煤矿安全风向标</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-blue': '#1e3a5f',
                        'safety-orange': '#f97316',
                    },
                    fontFamily: {
                        'sans': ['Noto Sans SC', 'PingFang SC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
        }
        
        /* Logo动画 */
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(249, 115, 22, 0.4), 0 0 60px rgba(249, 115, 22, 0.2); }
            50% { box-shadow: 0 0 50px rgba(249, 115, 22, 0.6), 0 0 100px rgba(249, 115, 22, 0.3); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes windFlow {
            0% { transform: translateX(-100%) rotate(-15deg); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateX(100%) rotate(-15deg); opacity: 0; }
        }
        
        .logo-container { animation: logoFloat 4s ease-in-out infinite; }
        .logo-glow { animation: pulseGlow 3s ease-in-out infinite; }
        .fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
        .wind-line { animation: windFlow 3s ease-in-out infinite; }
        
        .bg-pattern {
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(249, 115, 22, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-pattern">
    <!-- 风向标装饰线条 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="wind-line absolute top-1/4 left-0 w-full h-px bg-gradient-to-r from-transparent via-white/20 to-transparent" style="animation-delay: 0s;"></div>
        <div class="wind-line absolute top-1/2 left-0 w-full h-px bg-gradient-to-r from-transparent via-white/15 to-transparent" style="animation-delay: 1s;"></div>
        <div class="wind-line absolute top-3/4 left-0 w-full h-px bg-gradient-to-r from-transparent via-white/10 to-transparent" style="animation-delay: 2s;"></div>
    </div>

    <div class="h-full flex flex-col items-center justify-center px-8 relative z-10">
        <!-- Logo区域 -->
        <div class="logo-container mb-8">
            <div class="logo-glow relative w-32 h-32 rounded-3xl bg-gradient-to-br from-safety-orange to-orange-400 flex items-center justify-center">
                <!-- 风向标Logo SVG -->
                <svg viewBox="0 0 80 80" class="w-20 h-20">
                    <circle cx="40" cy="40" r="36" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
                    <circle cx="40" cy="40" r="4" fill="white"/>
                    <g transform="rotate(0, 40, 40)">
                        <polygon points="40,8 44,35 40,32 36,35" fill="white"/>
                        <polygon points="40,72 44,45 40,48 36,45" fill="white" opacity="0.5"/>
                    </g>
                    <g transform="rotate(90, 40, 40)">
                        <polygon points="40,12 43,32 40,30 37,32" fill="white" opacity="0.7"/>
                        <polygon points="40,68 43,48 40,50 37,48" fill="white" opacity="0.4"/>
                    </g>
                    <path d="M40 20 L52 26 L52 38 C52 44 46 50 40 52 C34 50 28 44 28 38 L28 26 Z" 
                          fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
                    <path d="M36 38 L39 41 L45 35" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>

        <!-- App名称 -->
        <div class="text-center mb-6 fade-in-up" style="animation-delay: 0.3s;">
            <h1 class="text-3xl font-black text-white tracking-wider mb-2">煤矿安全风向标</h1>
            <p class="text-safety-orange text-sm font-medium tracking-widest">COAL SAFETY COMPASS</p>
        </div>

        <!-- 标语 -->
        <div class="text-center mb-12 fade-in-up" style="animation-delay: 0.5s;">
            <p class="text-white/80 text-lg mb-3">让安全管理有据可依</p>
            <p class="text-white/60 text-sm">AI智能解读 · 专家权威背书 · 风险精准预警</p>
        </div>

        <!-- 专家库背书 -->
        <div class="w-full max-w-xs fade-in-up" style="animation-delay: 0.7s;">
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-4 border border-white/20">
                <p class="text-white/60 text-xs text-center mb-3">权威专家智库支持</p>
                <div class="flex justify-center items-center space-x-4">
                    <div class="text-center">
                        <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center mb-1">
                            <i class="fa-solid fa-university text-white text-lg"></i>
                        </div>
                        <span class="text-white/70 text-xs">中国矿大</span>
                    </div>
                    <div class="text-center">
                        <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center mb-1">
                            <i class="fa-solid fa-shield-halved text-white text-lg"></i>
                        </div>
                        <span class="text-white/70 text-xs">安全科学院</span>
                    </div>
                    <div class="text-center">
                        <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center mb-1">
                            <i class="fa-solid fa-users text-white text-lg"></i>
                        </div>
                        <span class="text-white/70 text-xs">50+专家</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 进入按钮 -->
        <button onclick="window.location.href='login.html'" 
                class="mt-10 px-12 py-4 bg-safety-orange hover:bg-orange-500 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/30 transition-all duration-300 transform hover:scale-105 fade-in-up"
                style="animation-delay: 0.9s;">
            开始使用
        </button>

        <!-- 底部信息 -->
        <div class="absolute bottom-8 text-center fade-in-up" style="animation-delay: 1.1s;">
            <p class="text-white/40 text-xs">版本 1.0.0</p>
        </div>
    </div>
</body>
</html>
