<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智脑 - 煤矿安全风向标</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-blue': '#1e3a5f',
                        'deep-blue-light': '#2d5a87',
                        'safety-orange': '#f97316',
                        'bg-primary': '#f8fafc',
                        'text-primary': '#1e293b',
                        'text-secondary': '#475569',
                        'text-muted': '#94a3b8',
                    },
                    fontFamily: { 'sans': ['Noto Sans SC', 'PingFang SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 0; display: none; }
        
        /* 搜索框聚焦效果 */
        .search-box {
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-box:focus-within {
            box-shadow: 0 4px 20px rgba(30, 58, 95, 0.15);
            border-color: #1e3a5f;
        }
        
        /* 搜索建议动画 */
        .suggestion-item {
            transition: all 0.2s ease;
        }
        .suggestion-item:hover {
            background-color: #f1f5f9;
            transform: translateX(4px);
        }
        
        /* 标签切换 */
        .mode-tab {
            transition: all 0.2s ease;
        }
        .mode-tab.active {
            background-color: #1e3a5f;
            color: white;
        }
        
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        /* AI光晕 */
        .ai-glow {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-bg-primary text-text-primary">
    <div class="min-h-screen flex flex-col">
        <!-- 顶部区域 -->
        <div class="gradient-bg pt-12 pb-8 px-6">
            <!-- Logo和标题 -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl ai-glow mb-4">
                    <i class="fa-solid fa-brain text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-deep-blue mb-2">AI 安全政委</h1>
                <p class="text-sm text-text-muted">为安全矿长和安全管理部提供专业支持</p>
            </div>

            <!-- 搜索模式切换 -->
            <div class="flex justify-center mb-6">
                <div class="inline-flex bg-white rounded-xl p-1 shadow-sm border border-slate-200">
                    <button class="mode-tab active px-4 py-2 rounded-lg text-sm font-medium" data-mode="general">
                        <i class="fa-solid fa-search mr-1"></i>全网搜索
                    </button>
                    <button class="mode-tab px-4 py-2 rounded-lg text-sm font-medium text-text-muted" data-mode="policy">
                        <i class="fa-solid fa-gavel mr-1"></i>政策检索
                    </button>
                    <button class="mode-tab px-4 py-2 rounded-lg text-sm font-medium text-text-muted" data-mode="case">
                        <i class="fa-solid fa-folder-open mr-1"></i>案例库
                    </button>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-box max-w-2xl mx-auto bg-white rounded-2xl border border-slate-200 overflow-hidden">
                <div class="flex items-center p-4">
                    <i class="fa-solid fa-magnifying-glass text-text-muted text-lg mr-3"></i>
                    <input type="text" 
                           id="search-input"
                           class="flex-1 text-base text-text-primary placeholder-text-muted outline-none bg-transparent"
                           placeholder="输入问题，如：2026年瓦斯抽采合规标准有哪些变化？">
                    <button class="ml-3 px-4 py-2 bg-deep-blue hover:bg-deep-blue-light text-white text-sm font-medium rounded-xl transition-colors" id="search-btn">
                        搜索
                    </button>
                </div>
            </div>

            <!-- 快捷提示 -->
            <div class="max-w-2xl mx-auto mt-4 flex items-center justify-center space-x-4 text-xs text-text-muted">
                <span><i class="fa-solid fa-keyboard mr-1"></i>Enter 搜索</span>
                <span><i class="fa-solid fa-microphone mr-1"></i>语音输入</span>
                <span><i class="fa-solid fa-history mr-1"></i>历史记录</span>
            </div>
        </div>

        <!-- 搜索建议区域 -->
        <div class="flex-1 px-6 py-6 overflow-y-auto">
            <!-- 热门问题 -->
            <div class="max-w-2xl mx-auto mb-8">
                <h3 class="text-sm font-bold text-text-primary mb-4 flex items-center">
                    <i class="fa-solid fa-fire text-safety-orange mr-2"></i>热门问题
                </h3>
                <div class="grid grid-cols-1 gap-3">
                    <div class="suggestion-item flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('2026年瓦斯抽采合规标准有哪些变化？')">
                        <div class="flex items-center space-x-3">
                            <span class="w-6 h-6 rounded-full bg-safety-orange/10 text-safety-orange text-xs flex items-center justify-center font-bold">1</span>
                            <span class="text-sm text-text-secondary">2026年瓦斯抽采合规标准有哪些变化？</span>
                        </div>
                        <span class="text-xs text-text-muted"><i class="fa-solid fa-arrow-trend-up mr-1"></i>热门</span>
                    </div>
                    <div class="suggestion-item flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('煤矿安全生产标准化考核要点是什么？')">
                        <div class="flex items-center space-x-3">
                            <span class="w-6 h-6 rounded-full bg-deep-blue/10 text-deep-blue text-xs flex items-center justify-center font-bold">2</span>
                            <span class="text-sm text-text-secondary">煤矿安全生产标准化考核要点是什么？</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-text-muted text-xs"></i>
                    </div>
                    <div class="suggestion-item flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('井下人员定位系统最新技术要求')">
                        <div class="flex items-center space-x-3">
                            <span class="w-6 h-6 rounded-full bg-deep-blue/10 text-deep-blue text-xs flex items-center justify-center font-bold">3</span>
                            <span class="text-sm text-text-secondary">井下人员定位系统最新技术要求</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-text-muted text-xs"></i>
                    </div>
                    <div class="suggestion-item flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('煤矿智能化改造补贴政策汇总')">
                        <div class="flex items-center space-x-3">
                            <span class="w-6 h-6 rounded-full bg-deep-blue/10 text-deep-blue text-xs flex items-center justify-center font-bold">4</span>
                            <span class="text-sm text-text-secondary">煤矿智能化改造补贴政策汇总</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-text-muted text-xs"></i>
                    </div>
                    <div class="suggestion-item flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('如何建立双重预防机制？')">
                        <div class="flex items-center space-x-3">
                            <span class="w-6 h-6 rounded-full bg-deep-blue/10 text-deep-blue text-xs flex items-center justify-center font-bold">5</span>
                            <span class="text-sm text-text-secondary">如何建立双重预防机制？</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-text-muted text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- 搜索历史 -->
            <div class="max-w-2xl mx-auto">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-text-primary flex items-center">
                        <i class="fa-solid fa-clock-rotate-left text-deep-blue mr-2"></i>搜索历史
                    </h3>
                    <button class="text-xs text-text-muted hover:text-deep-blue transition-colors">清空历史</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="suggestion-item p-3 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('煤矿通风系统安全管理规定')">
                        <p class="text-sm text-text-secondary truncate">煤矿通风系统安全管理规定</p>
                        <p class="text-xs text-text-muted mt-1">3天前</p>
                    </div>
                    <div class="suggestion-item p-3 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('瓦斯抽采达标评判细则')">
                        <p class="text-sm text-text-secondary truncate">瓦斯抽采达标评判细则</p>
                        <p class="text-xs text-text-muted mt-1">3天前</p>
                    </div>
                    <div class="suggestion-item p-3 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('煤矿安全规程修订条款')">
                        <p class="text-sm text-text-secondary truncate">煤矿安全规程修订条款</p>
                        <p class="text-xs text-text-muted mt-1">5天前</p>
                    </div>
                    <div class="suggestion-item p-3 bg-white rounded-xl border border-slate-100 cursor-pointer" onclick="startSearch('顶板事故预防措施')">
                        <p class="text-sm text-text-secondary truncate">顶板事故预防措施</p>
                        <p class="text-xs text-text-muted mt-1">1周前</p>
                    </div>
                </div>
            </div>

            <!-- 功能入口 -->
            <div class="max-w-2xl mx-auto mt-8">
                <h3 class="text-sm font-bold text-text-primary mb-4 flex items-center">
                    <i class="fa-solid fa-grid-2 text-deep-blue mr-2"></i>快捷功能
                </h3>
                <div class="grid grid-cols-4 gap-4">
                    <div class="text-center cursor-pointer" onclick="startSearch('本周安全检查重点')">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center mx-auto mb-2">
                            <i class="fa-solid fa-clipboard-check text-deep-blue"></i>
                        </div>
                        <span class="text-xs text-text-secondary">检查要点</span>
                    </div>
                    <div class="text-center cursor-pointer" onclick="startSearch('最新政策法规')">
                        <div class="w-12 h-12 rounded-xl bg-purple-50 flex items-center justify-center mx-auto mb-2">
                            <i class="fa-solid fa-gavel text-purple-500"></i>
                        </div>
                        <span class="text-xs text-text-secondary">政策法规</span>
                    </div>
                    <div class="text-center cursor-pointer" onclick="startSearch('事故案例分析')">
                        <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center mx-auto mb-2">
                            <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
                        </div>
                        <span class="text-xs text-text-secondary">事故案例</span>
                    </div>
                    <div class="text-center cursor-pointer" onclick="startSearch('培训材料')">
                        <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center mx-auto mb-2">
                            <i class="fa-solid fa-graduation-cap text-emerald-500"></i>
                        </div>
                        <span class="text-xs text-text-secondary">培训资料</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 搜索模式切换
        const modeTabs = document.querySelectorAll('.mode-tab');
        modeTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                modeTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 搜索功能
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        function startSearch(query) {
            if (query) {
                searchInput.value = query;
            }
            if (searchInput.value.trim()) {
                window.location.href = 'search-result.html?q=' + encodeURIComponent(searchInput.value);
            }
        }

        searchBtn.addEventListener('click', () => startSearch());
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
