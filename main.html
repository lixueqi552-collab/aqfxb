<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煤矿安全风向标 AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- 思源黑体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // 主色调 - 深邃蓝（科技与稳重）
                        'deep-blue': '#1e3a5f',
                        'deep-blue-light': '#2d5a87',
                        'deep-blue-dark': '#0f2744',
                        // 辅助色 - 安全橙（趋势预警）
                        'safety-orange': '#f97316',
                        'safety-orange-light': '#fb923c',
                        'safety-orange-dark': '#ea580c',
                        // 辅助色 - 警示红（警示通报）
                        'alert-red': '#dc2626',
                        'alert-red-light': '#ef4444',
                        'alert-red-dark': '#b91c1c',
                        // 背景色 - 浅灰/米白（降低视觉疲劳）
                        'bg-primary': '#f8fafc',
                        'bg-secondary': '#f1f5f9',
                        'bg-card': '#ffffff',
                        // 文字色
                        'text-primary': '#1e293b',
                        'text-secondary': '#475569',
                        'text-muted': '#94a3b8',
                        // AI智能感渐变
                        'ai-gradient-from': '#3b82f6',
                        'ai-gradient-to': '#8b5cf6',
                    },
                    fontFamily: {
                        'sans': ['Noto Sans SC', 'PingFang SC', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans SC', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
        }
        .page-container {
            display: none;
            height: calc(100vh - 64px);
            width: 100%;
        }
        .page-container.active {
            display: block;
        }
        .page-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .nav-item {
            transition: all 0.3s ease;
        }
        .nav-item.active {
            color: #1e3a5f;
        }
        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }
        .nav-icon {
            transition: transform 0.3s ease;
        }
        /* 毛玻璃效果 */
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        /* AI光晕效果 */
        .ai-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), 0 0 40px rgba(139, 92, 246, 0.2);
        }
        /* 底部导航安全区域适配 */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body class="bg-bg-primary">
    <!-- 页面容器 -->
    <div id="home-container" class="page-container active">
        <iframe src="pages/home.html" title="风向"></iframe>
    </div>
    <div id="zhinao-container" class="page-container">
        <iframe src="pages/zhinao.html" title="智脑"></iframe>
    </div>
    <div id="discover-container" class="page-container">
        <iframe src="pages/discover.html" title="发现"></iframe>
    </div>
    <div id="profile-container" class="page-container">
        <iframe src="pages/profile.html" title="我的"></iframe>
    </div>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 glass-effect border-t border-slate-200/50 z-50">
        <div class="flex justify-around items-center h-16 px-2">
            <!-- 风向 -->
            <div class="nav-item active flex flex-col items-center justify-center flex-1 h-full cursor-pointer" data-page="home">
                <div class="nav-icon">
                    <i class="fa-solid fa-wind text-xl"></i>
                </div>
                <span class="text-xs mt-1 font-medium">风向</span>
            </div>
            <!-- 智脑 -->
            <div class="nav-item flex flex-col items-center justify-center flex-1 h-full cursor-pointer text-slate-400" data-page="zhinao">
                <div class="nav-icon">
                    <i class="fa-solid fa-brain text-xl"></i>
                </div>
                <span class="text-xs mt-1 font-medium">智脑</span>
            </div>
            <!-- 发现 -->
            <div class="nav-item flex flex-col items-center justify-center flex-1 h-full cursor-pointer text-slate-400" data-page="discover">
                <div class="nav-icon">
                    <i class="fa-solid fa-compass text-xl"></i>
                </div>
                <span class="text-xs mt-1 font-medium">发现</span>
            </div>
            <!-- 我的 -->
            <div class="nav-item flex flex-col items-center justify-center flex-1 h-full cursor-pointer text-slate-400" data-page="profile">
                <div class="nav-icon">
                    <i class="fa-solid fa-user-shield text-xl"></i>
                </div>
                <span class="text-xs mt-1 font-medium">我的</span>
            </div>
        </div>
    </nav>

    <script>
        // 页面切换逻辑
        const navItems = document.querySelectorAll('.nav-item');
        const pageContainers = document.querySelectorAll('.page-container');

        navItems.forEach(item => {
            item.addEventListener('click', function() {
                const pageName = this.dataset.page;
                
                // 更新导航状态
                navItems.forEach(nav => {
                    nav.classList.remove('active');
                    nav.classList.add('text-slate-400');
                });
                this.classList.add('active');
                this.classList.remove('text-slate-400');

                // 切换页面
                pageContainers.forEach(container => {
                    container.classList.remove('active');
                });
                document.getElementById(`${pageName}-container`).classList.add('active');
            });
        });

        // 页面预加载（提升切换流畅度）
        window.addEventListener('load', function() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                if (iframe.src) {
                    // iframe 已有 src，无需额外处理
                }
            });
        });
    </script>
</body>
</html>
